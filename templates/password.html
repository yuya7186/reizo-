{% extends 'base.html' %}
{% block title %}パスワード変更{% endblock %}
{% block content %}
<div class="d-flex align-items-center mb-3 gap-2">
  <a href="/" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i></a>
  <h5 class="mb-0">🔑 パスワード変更</h5>
</div>

{% if message %}
<div class="alert alert-success">{{ message }}</div>
{% endif %}
{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<div class="card shadow-sm">
  <div class="card-body p-3">
    <p class="text-muted small mb-3">ログイン中：<strong>{{ session.get('display_name') }}</strong></p>
    <form method="post">
      <div class="mb-3">
        <label class="form-label">現在のパスワード</label>
        <input type="password" name="current" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">新しいパスワード</label>
        <input type="password" name="new_pw" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">新しいパスワード（確認）</label>
        <input type="password" name="confirm" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">変更する</button>
    </form>
  </div>
</div>
{% endblock %}
