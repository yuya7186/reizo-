<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン - 在庫管理</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #e8f0fe; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>
  <div class="card shadow p-4" style="width:100%;max-width:380px;">
    <h4 class="text-center mb-4">🧊 在庫管理</h4>
    {% if error %}
    <div class="alert alert-danger py-2">{{ error }}</div>
    {% endif %}
    <form method="post">
      <div class="mb-3">
        <label class="form-label">職員ID</label>
        <input type="text" name="username" class="form-control form-control-lg" autofocus required>
      </div>
      <div class="mb-4">
        <label class="form-label">パスワード</label>
        <input type="password" name="password" class="form-control form-control-lg" required>
      </div>
      <button type="submit" class="btn btn-primary btn-lg w-100">ログイン</button>
    </form>
  </div>
</body>
</html>
