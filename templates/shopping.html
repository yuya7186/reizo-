{% extends 'base.html' %}
{% block title %}買い物リスト{% endblock %}
{% block content %}
<div class="d-flex align-items-center mb-3 gap-2">
  <a href="/" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i></a>
  <h5 class="mb-0">🛒 買い物リスト</h5>
</div>

{% if shopping_list %}
<div class="list-group shadow-sm">
  {% for item in shopping_list %}
  <div class="list-group-item d-flex align-items-center justify-content-between py-2">
    <div>
      <strong>{{ item.name }}</strong>
      <span class="badge bg-secondary ms-2" style="font-size:0.7rem;">{{ item.storage }}</span>
    </div>
    <i class="bi bi-circle text-muted"></i>
  </div>
  {% endfor %}
</div>
<p class="text-muted small mt-3 text-center">必需品リストに登録済みで在庫がないものを表示しています</p>
{% else %}
<div class="text-center text-muted py-5">
  <i class="bi bi-check-circle" style="font-size:3rem;color:#28a745;"></i>
  <p class="mt-3">買い物が必要なものはありません</p>
</div>
{% endif %}
{% endblock %}
