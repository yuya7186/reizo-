<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}在庫管理{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#0d6efd">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="在庫管理">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <style>
    body { background: #f8f9fa; }
    .navbar-brand { font-weight: bold; }
    .card { border-radius: 12px; }
    .btn { border-radius: 8px; }
    .shortage-badge { font-size: 0.75rem; }
    .item-row:hover { background: #f0f4ff; }
    @media (max-width: 576px) {
      .hide-sm { display: none; }
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark bg-primary sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="/"><i class="bi bi-box-seam me-1"></i>在庫管理</a>
      <div class="d-flex align-items-center gap-2">
        <a href="/shopping" class="btn btn-sm btn-warning"><i class="bi bi-cart3"></i></a>
        {% if session.get('role') == 'admin' %}
        <a href="/admin" class="btn btn-sm btn-light"><i class="bi bi-gear"></i></a>
        {% endif %}
        <span class="text-white small hide-sm">{{ session.get('display_name','') }}</span>
        <a href="/logout" class="btn btn-sm btn-outline-light">ログアウト</a>
      </div>
    </div>
  </nav>
  <div class="container-fluid px-3 py-3" style="max-width:600px;">
    {% block content %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/static/sw.js');
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
